<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knockoff Connect</title>
    <link rel="icon" type="image/png" href="./word-thing.png">
    <style>
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        body {
            font-family: inherit, serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            overflow-x: hidden;
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100dvh;
            background-color: #e5e5da;
        }

        section {
            padding: clamp(1rem, 4vw, 2rem);
            text-align:center;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            text-align: center;
        }

        a {
            color: #007BFF;
            text-decoration: none;
        }
        button {
            display: block;
            margin: 0 auto;
            width: clamp(4rem, 16vw, 6.5rem);
            height: clamp(4rem, 16w, 6.5rem);
            text-align: center;
            border-radius: 0px;
            background-color: beige;
            text-transform: bold;
            font-size: clamp(1rem, 3vw, 1.2rem);
        }
        input{
            text-transform: uppercase;
            width: clamp(3rem, 12vw, 5rem);
            height: clamp(3rem, 12vw, 5rem);
            text-align: center;
            font-size: 2rem;
            transition: background-color 0.3s ease;
            background-color: #ccccbb;
            border:none;
        }
        dialog {
            position: relative;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            }
        #status {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: darkgreen;
            margin-top: 1rem;
        }
        #board {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .row1 {
            margin-top: 0.5rem;
        }
        .corner-link {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: #fff;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        .pulse {
            animation: pulse 0.2s ease;
        }
        .row {
            margin-bottom: 0.2rem;
            gap: 0.3rem;
            display: flex
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        @media (max-width: 200px) {
            h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <h1>Knockoff Connect</h1>
    <section>
        <div id = board></div>
    </section>
    <script>
        async function loadConnect(){
            const response = await fetch("connect.json");
            const data = await response.json();
            const cards = data.categories.flatMap(category => category.cards);
            const board = document.getElementById("board");
            for (let i = 0; i < 4; i++) {
                const row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 4; j++) {
                    const button = document.createElement("button");
                    button.id = (i * 4 + j);
                    const num = parseInt(button.id);
                    const card = cards.find(c => c.position === num);
                    button.textContent = card ? card.content : "";
                    row.appendChild(button);
                }
                board.appendChild(row);
            }
        }
        loadConnect();
    </script>
</body>
