<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knockoff Wordle</title>
    <link rel="icon" type="image/webp" href="https://www.internetmatters.org/wp-content/uploads/2022/02/wordle-logo.webp">
    <style>
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        body {
            font-family: Helvetica, serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            overflow-x: hidden;
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100dvh
        }

        section {
            padding: clamp(1rem, 4vw, 2rem);
            text-align:center;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            text-align: center;
        }

        a {
            color: #007BFF;
            text-decoration: none;
        }
        button {
            display: block;
            margin: 0 auto;
            padding: 1rem 2rem;
            border-radius: 20px;
            border: 3px solid #ccc;
            font-size: clamp(1rem, 3vw, 1.2rem);
        }
        input{
            text-transform: uppercase;
            width: 3rem;
            height: 3rem;
            text-align: center;
            font-size: 2rem;
            transition: background-color 0.3s ease;
            border-color:gainsboro;
        }
        #status {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: darkgreen;
            margin-top: 1rem;
        }
        #board {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .corner-link {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: #fff;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        .pulse {
            animation: pulse 0.2s ease;
        }
        .row {
            margin-bottom: 0.2rem;
            gap: 0.3rem;
            display: flex
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        @media (max-width: 600px) {
            h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <section id="project">
        <h1>Wordle</h1>
        <div id = "board">
            <div class = "row">
                <input maxlength="1">
                <input maxlength="1">
                <input maxlength="1">
                <input maxlength="1">
                <input maxlength="1">
            </div>
        </div>
        <p id ="status"></p>
        <button id ="submit">Submit</button>
        
    </section>

    <script>
        let word = "";
        async function loadWordle(){
            const response = await fetch("./wordle.json");
            const data = await response.json();
            word = data.answer;
            word = word.toLowerCase();
            console.log(word);
        }
        loadWordle();
        const status = document.getElementById("status");
        const board = document.getElementById("board");
        const submit = document.getElementById("submit");
        function setUpInput(input){
            input.addEventListener("input", () => {
                input.value = input.value.toLowerCase();

                if (input.value.length === 1){
                    const next = input.nextElementSibling;

                    if (next){
                        next.focus();
                    }
                }
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && input.value === ""){
                    const previous = input.previousElementSibling;

                    if (previous){
                        previous.focus();
                    }
                }
            });
        }
        document.querySelectorAll("input").forEach(setUpInput);
        submit.addEventListener("click",() =>{
        submit.classList.add("pulse");
        setTimeout(() => {
            submit.classList.remove("pulse");
        }, 200);
            const cuRow = board.lastElementChild;
            const res = cuRow.querySelectorAll("input");
            let guess = "";
            res.forEach((input, i) => {
                const letter = input.value.toLowerCase();
                guess += letter;

                if (word[i] === letter) {
                    input.style.backgroundColor = "#57af54";
                } else if (word.includes(letter)) {
                    input.style.backgroundColor = "#e2e03f";
                } else {
                    input.style.backgroundColor = "#7e8281";
                }
                input.style.color = "white";
                input.readOnly = true;
            });
            guess = guess.toLowerCase();
            if (guess === word){
                status.textContent = "You win!";
                return;
            }
            const nRow = document.createElement("div");
            nRow.className = "row";
            for (let i = 0; i < 5; i++){
                const input = document.createElement("input");
                input.maxLength = 1;
                setUpInput(input);
                nRow.appendChild(input);
            }
            board.appendChild(nRow);
        });

    </script>
</body>
</html>
