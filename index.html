<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knockoff Wordle</title>
    <link rel="icon" type="image/webp" href="https://www.internetmatters.org/wp-content/uploads/2022/02/wordle-logo.webp">
    <style>
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        body {
            font-family: Helvetica, serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            overflow-x: hidden;
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100dvh;
            background-color: #e5e5da;
        }

        section {
            padding: clamp(1rem, 4vw, 2rem);
            text-align:center;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            text-align: center;
        }

        a {
            color: #007BFF;
            text-decoration: none;
        }
        button {
            display: block;
            margin: 0 auto;
            padding: 1rem 2rem;
            border-radius: 20px;
            border: 3px solid #ccc;
            font-size: clamp(1rem, 3vw, 1.2rem);
        }
        input{
            text-transform: uppercase;
            width: 5rem;
            height: 5rem;
            text-align: center;
            font-size: 2rem;
            transition: background-color 0.3s ease;
            background-color: #ccccbb;
            border:none;
        }
        #status {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: darkgreen;
            margin-top: 1rem;
        }
        #board {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .corner-link {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: #fff;
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        .pulse {
            animation: pulse 0.2s ease;
        }
        .row {
            margin-bottom: 0.2rem;
            gap: 0.3rem;
            display: flex
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        @media (max-width: 600px) {
            h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <section id="project">
        <h1>Wordle</h1>
        <div id = "board">
            <div class = "row">
                <input maxlength="1">
                <input maxlength="1">
                <input maxlength="1">
                <input maxlength="1">
                <input maxlength="1">
            </div>
        </div>
        <p id ="status"></p>
        <button id ="submit">Submit</button>
        
    </section>

    <script>
        let word = "";
        let words = [];
        let guessNum = 0;
        async function loadWords(){
            const response = await fetch("./valid-wordle-words.txt");
            const text = await response.text();
            words = text.split("\n").map(wordy => wordy.trim().toLowerCase());
        }
        async function loadWordle(){
            const response = await fetch("./wordle.json");
            const data = await response.json();
            word = data.answer;
            word = word.toLowerCase();
        }
        loadWordle();
        loadWords();
        const status = document.getElementById("status");
        const board = document.getElementById("board");
        const submit = document.getElementById("submit");
        function setUpInput(input){
            input.addEventListener("input", () => {
                input.value = input.value.toLowerCase();

                if (input.value.length === 1){
                    const next = input.nextElementSibling;

                    if (next){
                        next.focus();
                    }
                }
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && input.value === ""){
                    const previous = input.previousElementSibling;

                    if (previous){
                        previous.focus();
                    }
                }
            });
        }
        document.querySelectorAll("input").forEach(setUpInput);
        submit.addEventListener("click", async() =>{
            submit.classList.add("pulse");
            setTimeout(() => {
                submit.classList.remove("pulse");
            }, 200);
            const cuRow = board.lastElementChild;
            const res = cuRow.querySelectorAll("input");
            let guess = "";
            res.forEach((input, i) => {
                guess += input.value.toLowerCase();
            });
            if (guess.length !== 5) {
                status.textContent = "Enter 5 letters";
                status.style.color = "red";
                setTimeout(() => {
                    status.textContent = "";
                }, 2000);
                return;
            }
            if (words.includes(guess)){
                let temp = word.split("");
                res.forEach((input, i) => {
                    if (guess[i] === temp[i]) {
                        input.style.backgroundColor = "#57af54";
                        temp[i] = null;
                    }
                });
                res.forEach((input, i) => {
                    if (input.style.backgroundColor === "rgb(87, 175, 84)") {
                        return;
                    }
                    const index = temp.indexOf(guess[i]);
                    if (index !== -1) {
                        input.style.backgroundColor = "#cccc4f";
                        temp[index] = null;
                    } else {
                        input.style.backgroundColor = "#7e8281";
                    }
                    input.style.color = "white";
                    input.readOnly = true;
                });
                    guess = guess.toLowerCase();
                    if (guess === word){
                        input.readOnly = true;
                        status.style.color = "green";
                        status.textContent = "You win!";
                        submit.disabled = true;
                        submit.style.display = "none";
                        return;
                    }
                    guessNum += 1;
                    if (guessNum > 5){
                        document.querySelectorAll("input").forEach(inp => {
                            inp.readOnly = true;
                        });
                        status.textContent = `You lose, it was: ${word.toUpperCase()}`;
                        status.style.color = "red";
                        submit.disabled = true;
                        submit.style.display = "none";
                        return;
                    }
                    const nRow = document.createElement("div");
                    nRow.className = "row";
                    for (let i = 0; i < 5; i++){
                        const input = document.createElement("input");
                        input.maxLength = 1;
                        setUpInput(input);
                        nRow.appendChild(input);
                    }
                    board.appendChild(nRow);
                    nRow.querySelector("input").focus();
            } else {
                status.textContent = "Enter a real word";
                status.style.color = "red";
                setTimeout(() => {
                    status.textContent = "";
                }, 2000);
            }
        });
        document.addEventListener("keydown",(e) => {
            if (e.key === "Enter"){
                submit.click();
            }
        });

    </script>
</body>
</html>
